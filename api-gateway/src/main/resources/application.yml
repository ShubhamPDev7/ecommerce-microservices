server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/inventory/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Custom-Header, Shubham

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/orders/**
              filters:
                - StripPrefix=1
                - name: LoggingOrdersFilter

            - id: shipping-service
              uri: lb://SHIPPING-SERVICE
              predicates:
                - Path=/shipping/**
              filters:
                - StripPrefix=1


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org:
      springframework:
        cloud:
          gateway: TRACE
        web: DEBUG